<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>pekabOO — Играть</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1a1a24;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #7a7a8e;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --green: #22c55e;
            --green-dim: rgba(34, 197, 94, 0.15);
            --red: #ef4444;
            --red-dim: rgba(239, 68, 68, 0.15);
            --amber: #f59e0b;
            --amber-glow: rgba(245, 158, 11, 0.25);
            --radius: 12px;
        }

        html, body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            overflow-x: hidden;
            -webkit-tap-highlight-color: transparent;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 50% 30%, rgba(168, 85, 247, 0.1), transparent);
            pointer-events: none;
            z-index: 0;
        }

        /* === PHASES — only one visible at a time === */
        .phase { display: none; }
        .phase.active { display: flex; }

        /* === JOIN PHASE === */
        #phase-join {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .join-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 40px 28px;
            width: 100%;
            max-width: 400px;
            box-shadow: 0 8px 60px rgba(0,0,0,0.5);
            animation: fade-up 0.6s ease-out;
        }

        .logo {
            text-align: center;
            font-size: 36px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
        }

        .join-subtitle {
            text-align: center;
            font-size: 15px;
            color: var(--text-dim);
            margin-bottom: 32px;
        }

        .field-group {
            margin-bottom: 20px;
        }

        .field-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: var(--text-dim);
            margin-bottom: 8px;
        }

        .field-group input {
            width: 100%;
            padding: 16px 18px;
            background: var(--surface-2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'Outfit', sans-serif;
            font-size: 18px;
            outline: none;
            transition: border-color 0.2s;
        }

        .field-group input:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .field-group input.code-input {
            font-family: 'JetBrains Mono', monospace;
            font-size: 28px;
            font-weight: 700;
            text-align: center;
            letter-spacing: 8px;
        }

        .btn-primary {
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 50px;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 17px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s;
            box-shadow: 0 4px 20px var(--accent-glow);
            margin-top: 8px;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 30px var(--accent-glow);
        }

        .btn-primary:active {
            transform: translateY(0);
        }

        .error-msg {
            background: var(--red-dim);
            border: 1px solid rgba(239, 68, 68, 0.3);
            color: var(--red);
            padding: 12px 16px;
            border-radius: var(--radius);
            font-size: 14px;
            margin-bottom: 16px;
            display: none;
            text-align: center;
        }

        .error-msg.visible { display: block; }

        /* === LOBBY PHASE === */
        #phase-lobby {
            flex-direction: column;
            align-items: center;
            padding: 32px 20px;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        .lobby-title {
            font-size: 20px;
            font-weight: 300;
            color: var(--text-dim);
            margin-bottom: 24px;
            text-align: center;
            animation: pulse-dim 2s ease-in-out infinite;
        }

        @keyframes pulse-dim {
            0%, 100% { opacity: 0.7; }
            50% { opacity: 1; }
        }

        .player-list {
            width: 100%;
            max-width: 400px;
            list-style: none;
        }

        .player-list li {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 14px 18px;
            margin-bottom: 8px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            gap: 10px;
            animation: fade-up 0.3s ease-out;
        }

        .player-list li.is-me {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), transparent);
        }

        .player-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--green);
            flex-shrink: 0;
        }

        .player-dot.offline { background: var(--red); }

        /* === BOARD PHASE === */
        #phase-board {
            flex-direction: column;
            align-items: center;
            padding: 16px 12px;
            min-height: 100vh;
            min-height: 100dvh;
            position: relative;
            z-index: 1;
        }

        .board-status {
            font-size: 15px;
            color: var(--text-dim);
            margin-bottom: 12px;
            text-align: center;
        }

        .board-status strong {
            color: var(--accent);
            font-weight: 700;
        }

        .pick-timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 24px;
            font-weight: 700;
            color: var(--amber);
            text-align: center;
            margin-bottom: 8px;
        }

        .board-grid {
            display: grid;
            gap: 2px;
            background: var(--border);
            border-radius: var(--radius);
            overflow: hidden;
            width: 100%;
            max-width: 500px;
            margin-bottom: 20px;
            box-shadow: 0 4px 40px rgba(0,0,0,0.4);
        }

        .board-grid .hdr {
            background: var(--surface);
            padding: 8px 4px;
            font-weight: 700;
            font-size: 11px;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            text-align: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .board-grid .cat-label {
            background: var(--surface);
            padding: 8px 6px;
            font-weight: 700;
            font-size: 12px;
            color: var(--accent);
            display: flex;
            align-items: center;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .board-cell {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 10px 4px;
            text-align: center;
            min-height: 44px;
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 14px;
            transition: all 0.2s;
        }

        .board-cell.unused {
            background: var(--surface-2);
            color: var(--green);
        }

        .board-cell.unused.clickable {
            cursor: pointer;
        }

        .board-cell.unused.clickable:active {
            background: rgba(34, 197, 94, 0.2);
            transform: scale(0.95);
        }

        .board-cell.selected {
            background: var(--amber-glow);
            color: var(--amber);
            animation: pulse-glow 2s ease-in-out infinite;
        }

        .board-cell.used {
            background: var(--bg);
            color: var(--border);
        }

        @keyframes pulse-glow {
            0%, 100% { box-shadow: inset 0 0 8px var(--amber-glow); }
            50% { box-shadow: inset 0 0 20px var(--amber-glow); }
        }

        /* === LEADERBOARD (shared) === */
        .leaderboard {
            width: 100%;
            max-width: 500px;
        }

        .leaderboard-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--text-dim);
            margin-bottom: 10px;
        }

        .lb-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            margin-bottom: 6px;
            font-size: 15px;
        }

        .lb-row.is-me {
            border-color: var(--accent);
            background: linear-gradient(135deg, rgba(168, 85, 247, 0.08), transparent);
        }

        .lb-row .lb-pos {
            font-weight: 700;
            color: var(--text-dim);
            margin-right: 10px;
            min-width: 22px;
        }

        .lb-row .lb-name {
            flex: 1;
            font-weight: 600;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .lb-row .lb-name.disconnected {
            color: var(--text-dim);
            text-decoration: line-through;
        }

        .lb-row .lb-score {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            font-size: 16px;
            color: var(--green);
            margin-left: 12px;
        }

        /* === LISTENING PHASE === */
        #phase-listen {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .listen-category {
            font-size: 14px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: var(--accent);
            margin-bottom: 4px;
        }

        .listen-points {
            font-family: 'JetBrains Mono', monospace;
            font-size: 48px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 32px;
        }

        .listen-label {
            font-size: 22px;
            font-weight: 300;
            color: var(--text-dim);
            animation: pulse-listen 1.5s ease-in-out infinite;
        }

        @keyframes pulse-listen {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .listen-bars {
            display: flex;
            gap: 4px;
            align-items: flex-end;
            height: 40px;
            margin-top: 24px;
        }

        .listen-bars span {
            width: 4px;
            background: var(--accent);
            border-radius: 2px;
            animation: bar-dance 1s ease-in-out infinite;
        }

        @keyframes bar-dance {
            0%, 100% { height: 8px; }
            50% { height: 36px; }
        }

        .listen-bars span:nth-child(1) { animation-delay: 0s; }
        .listen-bars span:nth-child(2) { animation-delay: 0.15s; }
        .listen-bars span:nth-child(3) { animation-delay: 0.3s; }
        .listen-bars span:nth-child(4) { animation-delay: 0.45s; }
        .listen-bars span:nth-child(5) { animation-delay: 0.6s; }

        /* === BUZZ PHASE === */
        #phase-buzz {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .buzz-timer {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            color: var(--amber);
            margin-bottom: 20px;
        }

        .buzz-btn {
            width: min(80vw, 300px);
            height: min(80vw, 300px);
            border-radius: 50%;
            border: 4px solid var(--red);
            background: radial-gradient(circle at 40% 35%, #ff6b6b, var(--red) 60%, #b91c1c);
            color: #fff;
            font-family: 'Outfit', sans-serif;
            font-size: 32px;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 4px;
            cursor: pointer;
            box-shadow: 0 0 40px rgba(239, 68, 68, 0.4), inset 0 -6px 12px rgba(0,0,0,0.3);
            transition: all 0.15s;
            -webkit-user-select: none;
            user-select: none;
            touch-action: manipulation;
        }

        .buzz-btn:active {
            transform: scale(0.95);
            box-shadow: 0 0 60px rgba(239, 68, 68, 0.6), inset 0 -2px 6px rgba(0,0,0,0.3);
        }

        .buzz-btn.pressed {
            background: radial-gradient(circle at 40% 35%, #86efac, var(--green) 60%, #166534);
            border-color: var(--green);
            box-shadow: 0 0 40px rgba(34, 197, 94, 0.4), inset 0 -6px 12px rgba(0,0,0,0.3);
            cursor: default;
        }

        .buzz-btn.locked {
            background: radial-gradient(circle at 40% 35%, #555, #333 60%, #1a1a1a);
            border-color: var(--border);
            box-shadow: none;
            cursor: default;
            opacity: 0.6;
        }

        .buzz-sub {
            font-size: 15px;
            color: var(--text-dim);
            margin-top: 16px;
            text-align: center;
        }

        /* === ANSWER PHASE === */
        #phase-answer {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .answer-label {
            font-size: 28px;
            font-weight: 800;
            color: var(--accent);
            margin-bottom: 12px;
            text-align: center;
        }

        .answer-sub {
            font-size: 16px;
            color: var(--text-dim);
            text-align: center;
        }

        .answer-waiting {
            font-size: 18px;
            color: var(--text-dim);
            text-align: center;
        }

        .answer-buzzer-name {
            font-size: 22px;
            font-weight: 700;
            color: var(--text);
            margin-bottom: 8px;
            text-align: center;
        }

        /* === RESULT PHASE === */
        #phase-result {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .result-icon {
            font-size: 64px;
            margin-bottom: 16px;
        }

        .result-text {
            font-size: 24px;
            font-weight: 700;
            margin-bottom: 8px;
            text-align: center;
        }

        .result-text.correct { color: var(--green); }
        .result-text.incorrect { color: var(--red); }

        .result-points {
            font-family: 'JetBrains Mono', monospace;
            font-size: 36px;
            font-weight: 700;
            margin-bottom: 16px;
        }

        .result-points.plus { color: var(--green); }
        .result-points.minus { color: var(--red); }

        .result-sub {
            font-size: 15px;
            color: var(--text-dim);
            text-align: center;
        }

        /* Flash overlays */
        .flash-overlay {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 999;
            opacity: 0;
        }

        .flash-overlay.green {
            background: radial-gradient(circle, rgba(34, 197, 94, 0.3), transparent 70%);
            animation: flash-in 0.6s ease-out forwards;
        }

        .flash-overlay.red {
            background: radial-gradient(circle, rgba(239, 68, 68, 0.3), transparent 70%);
            animation: flash-in 0.6s ease-out forwards;
        }

        @keyframes flash-in {
            0% { opacity: 1; }
            100% { opacity: 0; }
        }

        /* === GAME OVER === */
        #phase-gameover {
            flex-direction: column;
            align-items: center;
            justify-content: flex-start;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 40px 20px;
            position: relative;
            z-index: 1;
        }

        .gameover-title {
            font-size: 28px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 24px;
        }

        .final-pos {
            font-size: 18px;
            color: var(--text-dim);
            margin-bottom: 24px;
        }

        .final-pos strong {
            color: var(--amber);
            font-weight: 800;
            font-size: 22px;
        }

        /* === HOST DISCONNECTED === */
        #phase-hostdc {
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            min-height: 100dvh;
            padding: 24px;
            position: relative;
            z-index: 1;
        }

        .hostdc-icon { font-size: 48px; margin-bottom: 16px; }
        .hostdc-text { font-size: 18px; color: var(--text-dim); text-align: center; }

        /* === ANIMATIONS === */
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>

<!-- ============ PHASE: JOIN ============ -->
<div class="phase active" id="phase-join">
    <div class="join-card">
        <div class="logo">pekabOO</div>
        <p class="join-subtitle">Введите код комнаты и имя</p>

        <div class="error-msg" id="join-error"></div>

        <div class="field-group">
            <label for="room-code">Код комнаты</label>
            <input type="tel" id="room-code" class="code-input" maxlength="6" placeholder="000000" autocomplete="off" inputmode="numeric">
        </div>
        <div class="field-group">
            <label for="player-name">Ваше имя</label>
            <input type="text" id="player-name" maxlength="20" placeholder="Имя" autocomplete="off">
        </div>
        <button class="btn-primary" id="btn-join">Войти</button>
    </div>
</div>

<!-- ============ PHASE: LOBBY ============ -->
<div class="phase" id="phase-lobby">
    <div class="logo" style="margin-bottom:24px; font-size:28px;">pekabOO</div>
    <div class="lobby-title">Ожидание начала игры...</div>
    <ul class="player-list" id="lobby-players"></ul>
</div>

<!-- ============ PHASE: BOARD ============ -->
<div class="phase" id="phase-board">
    <div class="board-status" id="board-status">Ожидание выбора...</div>
    <div class="pick-timer" id="pick-timer" style="display:none;"></div>
    <div class="board-grid" id="board-grid"></div>
    <div class="leaderboard" id="board-leaderboard"></div>
</div>

<!-- ============ PHASE: LISTEN ============ -->
<div class="phase" id="phase-listen">
    <div class="listen-category" id="listen-cat"></div>
    <div class="listen-points" id="listen-pts"></div>
    <div class="listen-label">Слушайте...</div>
    <div class="listen-bars">
        <span></span><span></span><span></span><span></span><span></span>
    </div>
</div>

<!-- ============ PHASE: BUZZ ============ -->
<div class="phase" id="phase-buzz">
    <div class="buzz-timer" id="buzz-timer"></div>
    <button class="buzz-btn" id="buzz-btn">BUZZ</button>
    <div class="buzz-sub" id="buzz-sub"></div>
</div>

<!-- ============ PHASE: ANSWER ============ -->
<div class="phase" id="phase-answer">
    <div id="answer-content"></div>
</div>

<!-- ============ PHASE: RESULT ============ -->
<div class="phase" id="phase-result">
    <div class="result-icon" id="result-icon"></div>
    <div class="result-text" id="result-text"></div>
    <div class="result-points" id="result-points"></div>
    <div class="result-sub" id="result-sub"></div>
</div>

<!-- ============ PHASE: GAME OVER ============ -->
<div class="phase" id="phase-gameover">
    <div class="gameover-title">Игра окончена!</div>
    <div class="final-pos" id="final-pos"></div>
    <div class="leaderboard" id="final-leaderboard" style="max-width:400px;"></div>
</div>

<!-- ============ PHASE: HOST DISCONNECTED ============ -->
<div class="phase" id="phase-hostdc">
    <div class="hostdc-icon">&#9888;</div>
    <div class="hostdc-text">Ведущий отключился.<br>Игра приостановлена.</div>
</div>

<!-- Flash overlay for result effects -->
<div class="flash-overlay" id="flash-overlay"></div>
<div id="pauseOverlayPlay" style="display:none; position:fixed; inset:0; z-index:9999; background:rgba(0,0,0,0.85); backdrop-filter:blur(8px); align-items:center; justify-content:center; flex-direction:column;">
    <div style="font-family:'Outfit',sans-serif; font-size:clamp(28px,8vw,48px); font-weight:800; color:#f59e0b;">ПАУЗА</div>
</div>

<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<script>
(function() {
    'use strict';

    var socket = io();
    var myName = '';
    var boardData = {};   // {"cat|pts": {state: "unused"|"selected"|"used"}}
    var genresList = [];
    var pointsList = [];
    var currentScores = [];
    var buzzLocked = [];  // names that already answered wrong this round
    var hasBuzzed = false;
    var pickTimerInterval = null;
    var buzzTimerInterval = null;
    var guessEndTime = 0;

    // === PHASE SWITCHING ===
    function showPhase(id) {
        var phases = document.querySelectorAll('.phase');
        for (var i = 0; i < phases.length; i++) {
            phases[i].classList.remove('active');
        }
        document.getElementById('phase-' + id).classList.add('active');
        window.scrollTo(0, 0);
    }

    // === JOIN ===
    var btnJoin = document.getElementById('btn-join');
    var codeInput = document.getElementById('room-code');
    var nameInput = document.getElementById('player-name');
    var joinError = document.getElementById('join-error');

    btnJoin.addEventListener('click', function() {
        var code = codeInput.value.trim();
        var name = nameInput.value.trim();
        if (!code || !name) {
            showJoinError('Введите код и имя');
            return;
        }
        btnJoin.disabled = true;
        btnJoin.textContent = 'Подключение...';
        socket.emit('join_game', { code: code, name: name });
    });

    // Allow Enter key in inputs
    codeInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { nameInput.focus(); }
    });
    nameInput.addEventListener('keydown', function(e) {
        if (e.key === 'Enter') { btnJoin.click(); }
    });

    function showJoinError(msg) {
        joinError.textContent = msg;
        joinError.classList.add('visible');
        btnJoin.disabled = false;
        btnJoin.textContent = 'Войти';
    }

    socket.on('join_error', function(data) {
        showJoinError(data.msg);
    });

    socket.on('joined', function(data) {
        myName = data.name;
        currentScores = data.scores || [];
        boardData = data.board || {};
        genresList = data.genres || [];
        pointsList = data.points || [];

        var state = data.state;
        if (state === 'lobby') {
            renderLobbyPlayers(currentScores);
            showPhase('lobby');
        } else if (state === 'picking') {
            renderBoard(data.picker);
            renderLeaderboard('board-leaderboard', currentScores);
            showPhase('board');
        } else if (state === 'playing') {
            showPhase('listen');
        } else if (state === 'buzzing') {
            hasBuzzed = false;
            buzzLocked = [];
            showBuzzPhase();
        } else if (state === 'judging') {
            showPhase('answer');
        } else if (state === 'finished') {
            showGameOver(currentScores);
        } else {
            renderLobbyPlayers(currentScores);
            showPhase('lobby');
        }
    });

    // === LOBBY ===
    function renderLobbyPlayers(scores) {
        var ul = document.getElementById('lobby-players');
        ul.innerHTML = '';
        for (var i = 0; i < scores.length; i++) {
            var li = document.createElement('li');
            if (scores[i].name === myName) li.className = 'is-me';
            var dot = document.createElement('span');
            dot.className = 'player-dot' + (scores[i].connected ? '' : ' offline');
            li.appendChild(dot);
            li.appendChild(document.createTextNode(scores[i].name));
            ul.appendChild(li);
        }
    }

    socket.on('player_joined', function(data) {
        currentScores = data.players;
        var lobbyEl = document.getElementById('phase-lobby');
        if (lobbyEl.classList.contains('active')) {
            renderLobbyPlayers(currentScores);
        }
    });

    socket.on('player_disconnected', function(data) {
        currentScores = data.players;
        var lobbyEl = document.getElementById('phase-lobby');
        if (lobbyEl.classList.contains('active')) {
            renderLobbyPlayers(currentScores);
        }
        // Also update board leaderboard if visible
        var boardEl = document.getElementById('phase-board');
        if (boardEl.classList.contains('active')) {
            renderLeaderboard('board-leaderboard', currentScores);
        }
    });

    // === GAME STARTED ===
    socket.on('game_started', function(data) {
        boardData = data.board || {};
        genresList = data.genres || [];
        pointsList = data.points || [];
        currentScores = data.scores || [];
        renderBoard(null); // host picks first
        renderLeaderboard('board-leaderboard', currentScores);
        showPhase('board');
    });

    // === BOARD ===
    function renderBoard(picker) {
        var grid = document.getElementById('board-grid');
        grid.innerHTML = '';
        grid.style.gridTemplateColumns = 'minmax(60px, auto) repeat(' + pointsList.length + ', 1fr)';

        // Corner cell
        var corner = document.createElement('div');
        corner.className = 'hdr';
        grid.appendChild(corner);

        // Point headers
        for (var p = 0; p < pointsList.length; p++) {
            var hdr = document.createElement('div');
            hdr.className = 'hdr';
            hdr.textContent = pointsList[p];
            grid.appendChild(hdr);
        }

        var isPicker = picker && picker === myName;

        // Rows
        for (var g = 0; g < genresList.length; g++) {
            var cat = genresList[g];
            var catLabel = document.createElement('div');
            catLabel.className = 'cat-label';
            catLabel.textContent = cat;
            grid.appendChild(catLabel);

            for (var p = 0; p < pointsList.length; p++) {
                var pts = pointsList[p];
                var key = cat + '|' + pts;
                var cellData = boardData[key] || { state: 'unused' };
                var cell = document.createElement('div');
                cell.className = 'board-cell ' + cellData.state;

                if (cellData.state === 'unused') {
                    cell.textContent = pts;
                    if (isPicker) {
                        cell.classList.add('clickable');
                        (function(c, pt) {
                            cell.addEventListener('click', function() {
                                socket.emit('pick_cell', { category: c, pts: pt });
                            });
                        })(cat, pts);
                    }
                } else if (cellData.state === 'selected') {
                    cell.textContent = pts;
                } else {
                    cell.innerHTML = '&mdash;';
                }

                grid.appendChild(cell);
            }
        }

        // Update status
        var status = document.getElementById('board-status');
        if (isPicker) {
            status.innerHTML = '<strong>Ваш выбор!</strong> Выберите ячейку';
            startPickTimer();
        } else if (picker) {
            status.innerHTML = 'Выбирает: <strong>' + escHtml(picker) + '</strong>';
            clearPickTimer();
        } else {
            status.innerHTML = 'Ведущий выбирает...';
            clearPickTimer();
        }
    }

    function startPickTimer() {
        clearPickTimer();
        var timerEl = document.getElementById('pick-timer');
        timerEl.style.display = 'block';
        var remaining = 15;
        timerEl.textContent = remaining;
        pickTimerInterval = setInterval(function() {
            remaining--;
            if (remaining <= 0) {
                clearPickTimer();
                return;
            }
            timerEl.textContent = remaining;
        }, 1000);
    }

    function clearPickTimer() {
        if (pickTimerInterval) {
            clearInterval(pickTimerInterval);
            pickTimerInterval = null;
        }
        document.getElementById('pick-timer').style.display = 'none';
    }

    function renderLeaderboard(containerId, scores) {
        var container = document.getElementById(containerId);
        container.innerHTML = '<div class="leaderboard-title">Счёт</div>';
        for (var i = 0; i < scores.length; i++) {
            var row = document.createElement('div');
            row.className = 'lb-row' + (scores[i].name === myName ? ' is-me' : '');
            var pos = document.createElement('span');
            pos.className = 'lb-pos';
            pos.textContent = (i + 1) + '.';
            row.appendChild(pos);
            var name = document.createElement('span');
            name.className = 'lb-name' + (scores[i].connected === false ? ' disconnected' : '');
            name.textContent = scores[i].name;
            row.appendChild(name);
            var score = document.createElement('span');
            score.className = 'lb-score';
            score.textContent = scores[i].score;
            row.appendChild(score);
            container.appendChild(row);
        }
    }

    // === CELL PICKED ===
    socket.on('cell_picked', function(data) {
        // Update board data to show selected cell
        var key = data.category + '|' + data.pts;
        if (boardData[key]) boardData[key].state = 'selected';
    });

    // === AUTO PICK ===
    socket.on('auto_pick', function(data) {
        var key = data.category + '|' + data.pts;
        if (boardData[key]) boardData[key].state = 'selected';
    });

    socket.on('pick_expired', function() {
        showPhase('phase-board');
        renderBoard();
        renderScores();
    });

    socket.on('game_paused', function() {
        document.getElementById('pauseOverlayPlay').style.display = 'flex';
    });

    socket.on('game_resumed', function() {
        document.getElementById('pauseOverlayPlay').style.display = 'none';
    });

    // === ROUND START (LISTENING / BUZZING) ===
    socket.on('round_start', function(data) {
        hasBuzzed = false;
        buzzLocked = [];
        document.getElementById('listen-cat').textContent = data.category;
        document.getElementById('listen-pts').textContent = data.pts;

        // If buzzer is already open (new simplified timer mode), go straight to buzz
        if (data.buzzer_open) {
            guessEndTime = Date.now() + ((data.guess_duration || 30) * 1000);
            showBuzzPhase();
        } else {
            showPhase('listen');
        }
    });

    // === BUZZER OPEN ===
    socket.on('buzzer_open', function(data) {
        guessEndTime = Date.now() + (data.guess_duration * 1000);
        showBuzzPhase();
    });

    function showBuzzPhase() {
        showPhase('buzz');
        var btn = document.getElementById('buzz-btn');
        var sub = document.getElementById('buzz-sub');

        if (buzzLocked.indexOf(myName) !== -1) {
            btn.className = 'buzz-btn locked';
            btn.textContent = 'Уже отвечали';
            sub.textContent = '';
        } else if (hasBuzzed) {
            btn.className = 'buzz-btn pressed';
            btn.textContent = 'Вы нажали!';
            sub.textContent = 'Ожидание...';
        } else {
            btn.className = 'buzz-btn';
            btn.textContent = 'BUZZ';
            sub.textContent = 'Нажмите, чтобы ответить!';
        }

        startBuzzTimer();
    }

    function startBuzzTimer() {
        clearBuzzTimer();
        var timerEl = document.getElementById('buzz-timer');
        timerEl.style.display = 'block';
        updateBuzzTimer();
        buzzTimerInterval = setInterval(updateBuzzTimer, 200);
    }

    function updateBuzzTimer() {
        var remaining = Math.max(0, Math.ceil((guessEndTime - Date.now()) / 1000));
        document.getElementById('buzz-timer').textContent = remaining + 'с';
        if (remaining <= 0) {
            clearBuzzTimer();
        }
    }

    function clearBuzzTimer() {
        if (buzzTimerInterval) {
            clearInterval(buzzTimerInterval);
            buzzTimerInterval = null;
        }
    }

    // Buzz button handler
    document.getElementById('buzz-btn').addEventListener('click', function() {
        if (hasBuzzed) return;
        if (buzzLocked.indexOf(myName) !== -1) return;
        if (this.classList.contains('locked') || this.classList.contains('pressed')) return;

        hasBuzzed = true;
        socket.emit('buzz', {});

        // Haptic feedback
        if (navigator.vibrate) navigator.vibrate(100);

        this.className = 'buzz-btn pressed';
        this.textContent = 'Вы нажали!';
        document.getElementById('buzz-sub').textContent = 'Ожидание...';
    });

    // === FIRST BUZZ ===
    socket.on('first_buzz', function(data) {
        clearBuzzTimer();
        var content = document.getElementById('answer-content');
        if (data.name === myName) {
            content.innerHTML =
                '<div class="answer-label">Ваш ответ!</div>' +
                '<div class="answer-sub">Скажите ответ вслух. Ведущий оценит.</div>';
        } else {
            content.innerHTML =
                '<div class="answer-buzzer-name">' + escHtml(data.name) + '</div>' +
                '<div class="answer-waiting">отвечает...</div>';
        }
        showPhase('answer');
    });

    // === WRONG ANSWER (buzzer reopens) ===
    socket.on('wrong_answer', function(data) {
        currentScores = data.scores;
        buzzLocked = data.locked || [];
        // Reset guess timer from server remaining time
        if (data.guess_remaining) {
            guessEndTime = Date.now() + (data.guess_remaining * 1000);
        }

        // Show brief result flash
        if (data.name === myName) {
            showResultFlash('Неверно!', data.points_change, false);
            setTimeout(function() {
                hasBuzzed = false;
                showBuzzPhase();
            }, 1500);
        } else {
            showResultFlash(escHtml(data.name) + ' ответил неверно', null, false);
            setTimeout(function() {
                hasBuzzed = false;
                showBuzzPhase();
            }, 1500);
        }
    });

    // === ROUND RESULT ===
    socket.on('round_result', function(data) {
        clearBuzzTimer();
        clearPickTimer();
        currentScores = data.scores;
        if (data.board) boardData = data.board;

        var resultType = data.result || (data.correct ? 'full' : 'wrong');

        if (resultType === 'skip') {
            showResultFlash('Пропущено', null, false);
        } else if (data.name === myName) {
            if (data.correct) {
                showResultFlash('Верно!', '+' + data.points_change, true);
            } else {
                showResultFlash('Неверно!', data.points_change, false);
            }
        } else {
            if (data.correct) {
                showResultFlash(escHtml(data.name) + ' угадал!', '+' + data.points_change, true);
            } else if (data.all_locked) {
                showResultFlash('Никто не угадал', null, false);
            } else {
                showResultFlash(escHtml(data.name) + ' ошибся', data.points_change, false);
            }
        }

        // Transition to board after delay
        var picker = data.picker || null;
        setTimeout(function() {
            renderBoard(picker);
            renderLeaderboard('board-leaderboard', currentScores);
            showPhase('board');
        }, 2500);
    });

    function showResultFlash(text, pointsStr, isCorrect) {
        showPhase('result');
        document.getElementById('result-icon').textContent = isCorrect ? '\u2714' : '\u2718';
        var textEl = document.getElementById('result-text');
        textEl.textContent = text;
        textEl.className = 'result-text ' + (isCorrect ? 'correct' : 'incorrect');

        var ptsEl = document.getElementById('result-points');
        if (pointsStr !== null && pointsStr !== undefined) {
            ptsEl.textContent = pointsStr;
            ptsEl.className = 'result-points ' + (isCorrect ? 'plus' : 'minus');
            ptsEl.style.display = 'block';
        } else {
            ptsEl.style.display = 'none';
        }

        // Flash overlay
        var flash = document.getElementById('flash-overlay');
        flash.className = 'flash-overlay ' + (isCorrect ? 'green' : 'red');
        // Force reflow to restart animation
        void flash.offsetWidth;
        flash.className = 'flash-overlay ' + (isCorrect ? 'green' : 'red');
    }

    // === TIME UP ===
    socket.on('time_up', function(data) {
        clearBuzzTimer();
        clearPickTimer();
        currentScores = data.scores;
        if (data.board) boardData = data.board;

        showResultFlash('Время вышло!', null, false);

        var picker = data.picker || null;
        setTimeout(function() {
            renderBoard(picker);
            renderLeaderboard('board-leaderboard', currentScores);
            showPhase('board');
        }, 2500);
    });

    // === GAME OVER ===
    socket.on('game_over', function(data) {
        clearBuzzTimer();
        clearPickTimer();
        showGameOver(data.scores);
    });

    function showGameOver(scores) {
        currentScores = scores;
        // Find my position
        var myPos = 0;
        for (var i = 0; i < scores.length; i++) {
            if (scores[i].name === myName) { myPos = i + 1; break; }
        }
        document.getElementById('final-pos').innerHTML = 'Ваше место: <strong>#' + myPos + '</strong>';
        renderLeaderboard('final-leaderboard', scores);
        showPhase('gameover');
    }

    // === HOST DISCONNECTED ===
    socket.on('host_disconnected', function() {
        showPhase('hostdc');
    });

    // === UTILS ===
    function escHtml(str) {
        var div = document.createElement('div');
        div.textContent = str;
        return div.innerHTML;
    }
})();
</script>
</body>
</html>
