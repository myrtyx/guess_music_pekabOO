<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pekabOO — Выбор режима</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1a1a24;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #7a7a8e;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --green: #22c55e;
            --green-glow: rgba(34, 197, 94, 0.25);
            --amber: #f59e0b;
            --radius: 16px;
        }
        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 24px;
        }
        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 30% 30%, rgba(168, 85, 247, 0.08), transparent),
                radial-gradient(ellipse 500px 500px at 70% 70%, rgba(34, 197, 94, 0.06), transparent);
            pointer-events: none;
        }
        .logo {
            font-size: clamp(36px, 8vw, 56px);
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 8px;
            position: relative;
            z-index: 1;
            animation: fade-down 0.6s ease-out;
        }
        .subtitle {
            font-size: 16px;
            color: var(--text-dim);
            margin-bottom: 48px;
            position: relative;
            z-index: 1;
            animation: fade-down 0.6s ease-out 0.1s both;
        }
        .modes {
            display: flex;
            gap: 24px;
            flex-wrap: wrap;
            justify-content: center;
            position: relative;
            z-index: 1;
        }
        .mode-card {
            background: var(--surface);
            border: 2px solid var(--border);
            border-radius: 20px;
            padding: 40px 36px;
            width: 280px;
            text-decoration: none;
            color: var(--text);
            transition: all 0.3s;
            cursor: pointer;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 16px;
        }
        .mode-card:hover {
            transform: translateY(-6px);
            border-color: var(--accent);
            box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px var(--accent-glow);
        }
        .mode-card:nth-child(1) { animation: fade-up 0.6s ease-out 0.2s both; }
        .mode-card:nth-child(2) { animation: fade-up 0.6s ease-out 0.35s both; }
        .mode-icon {
            font-size: 48px;
            line-height: 1;
        }
        .mode-name {
            font-size: 22px;
            font-weight: 800;
        }
        .mode-desc {
            font-size: 14px;
            color: var(--text-dim);
            line-height: 1.5;
        }
        .card-classic .mode-name { color: var(--green); }
        .card-classic:hover { border-color: var(--green); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px var(--green-glow); }
        .card-buzzer .mode-name { color: var(--amber); }
        .card-buzzer:hover { border-color: var(--amber); box-shadow: 0 12px 40px rgba(0,0,0,0.4), 0 0 30px rgba(245,158,11,0.25); }
        .nav-admin {
            position: fixed;
            top: 16px;
            right: 24px;
            z-index: 10;
        }
        .nav-admin a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-admin a:hover { color: var(--text); background: var(--surface-2); }
        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes fade-up {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="nav-admin"><a href="{{ url_for('admin') }}">Админка</a></div>
    <div class="logo">pekabOO</div>
    <p class="subtitle">Выбери режим игры</p>
    <div class="modes">
        <a href="{{ url_for('setup') }}" class="mode-card card-classic">
            <span class="mode-icon">&#127925;</span>
            <span class="mode-name">Классический</span>
            <span class="mode-desc">Команды по очереди выбирают ячейки и угадывают мелодии</span>
        </a>
        <a href="{{ url_for('buzzer_host') }}" class="mode-card card-buzzer">
            <span class="mode-icon">&#128276;</span>
            <span class="mode-name">Баззер</span>
            <span class="mode-desc">Каждый сам за себя — кто быстрее нажмёт, тот отвечает</span>
        </a>
    </div>
</body>
</html>
