<!doctype html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>pekabOO — Играет</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;600;800&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        :root {
            --bg: #0a0a0f;
            --surface: #13131a;
            --surface-2: #1a1a24;
            --border: #2a2a3a;
            --text: #e8e8f0;
            --text-dim: #7a7a8e;
            --accent: #a855f7;
            --accent-glow: rgba(168, 85, 247, 0.3);
            --green: #22c55e;
            --amber: #f59e0b;
            --red: #ef4444;
            --radius: 12px;
        }

        body {
            font-family: 'Outfit', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background:
                radial-gradient(ellipse 600px 400px at 20% 20%, rgba(168, 85, 247, 0.08), transparent),
                radial-gradient(ellipse 500px 500px at 80% 80%, rgba(34, 197, 94, 0.06), transparent);
            pointer-events: none;
        }

        /* === TIMER BAR (full width at top) === */
        .timer-bar {
            position: fixed;
            top: 0;
            left: 0;
            height: 4px;
            background: var(--green);
            z-index: 200;
            transition: width 1s linear, background 0.5s;
            box-shadow: 0 0 12px rgba(34, 197, 94, 0.5);
        }
        .timer-bar.warning {
            background: var(--amber);
            box-shadow: 0 0 12px rgba(245, 158, 11, 0.5);
        }
        .timer-bar.danger {
            background: var(--red);
            box-shadow: 0 0 12px rgba(239, 68, 68, 0.5);
        }

        /* === VOLUME CONTROL (always visible top-right) === */
        .volume-control {
            position: fixed;
            top: 12px;
            right: 24px;
            z-index: 150;
            display: flex;
            align-items: center;
            gap: 8px;
            background: rgba(19, 19, 26, 0.9);
            backdrop-filter: blur(12px);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 8px 16px;
        }
        .vol-icon {
            font-size: 18px;
            cursor: pointer;
            user-select: none;
            width: 24px;
            text-align: center;
        }
        .vol-slider {
            -webkit-appearance: none;
            appearance: none;
            width: 100px;
            height: 4px;
            background: var(--border);
            border-radius: 2px;
            outline: none;
            cursor: pointer;
        }
        .vol-slider::-webkit-slider-thumb {
            -webkit-appearance: none;
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            box-shadow: 0 0 8px var(--accent-glow);
        }
        .vol-slider::-moz-range-thumb {
            width: 14px;
            height: 14px;
            border-radius: 50%;
            background: var(--accent);
            cursor: pointer;
            border: none;
        }

        /* === NAV === */
        nav {
            position: relative;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 16px 32px;
            background: rgba(10, 10, 15, 0.85);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }
        .logo {
            font-size: 22px;
            font-weight: 800;
            background: linear-gradient(135deg, var(--accent), #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .nav-links a {
            color: var(--text-dim);
            text-decoration: none;
            font-size: 14px;
            padding: 8px 16px;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-links a:hover { color: var(--text); background: var(--surface-2); }

        /* === CONTENT === */
        .main {
            position: relative;
            z-index: 1;
            max-width: 700px;
            margin: 0 auto;
            padding: 48px 24px;
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        .cell-badge {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 50px;
            padding: 10px 24px;
            margin-bottom: 16px;
            animation: fade-down 0.5s ease-out;
        }
        .cell-badge .cat {
            font-weight: 700;
            color: var(--accent);
        }
        .cell-badge .pts {
            font-family: 'JetBrains Mono', monospace;
            font-weight: 700;
            color: var(--green);
            font-size: 20px;
        }

        .team-turn {
            font-size: clamp(16px, 3vw, 22px);
            font-weight: 300;
            color: var(--text-dim);
            margin-bottom: 8px;
            animation: fade-down 0.5s ease-out 0.1s both;
        }
        .team-turn strong { font-weight: 800; color: var(--text); }

        .timer-display {
            font-family: 'JetBrains Mono', monospace;
            font-size: clamp(48px, 10vw, 80px);
            font-weight: 700;
            margin: 24px 0;
            letter-spacing: -2px;
            animation: fade-down 0.6s ease-out 0.2s both;
            transition: color 0.5s;
        }
        .timer-green { color: var(--green); }
        .timer-amber { color: var(--amber); }
        .timer-red { color: var(--red); }

        /* === PLAYER === */
        .player-box {
            display: flex;
            align-items: center;
            gap: 16px;
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 60px;
            padding: 12px 28px;
            margin: 24px 0 32px;
            animation: fade-down 0.6s ease-out 0.3s both;
        }
        .play-btn {
            width: 52px;
            height: 52px;
            border-radius: 50%;
            border: none;
            background: var(--accent);
            color: #fff;
            font-size: 22px;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
            box-shadow: 0 4px 16px var(--accent-glow);
            flex-shrink: 0;
        }
        .play-btn:hover {
            transform: scale(1.08);
            box-shadow: 0 6px 24px var(--accent-glow);
        }
        .player-time {
            font-family: 'JetBrains Mono', monospace;
            font-size: 14px;
            color: var(--text-dim);
            min-width: 42px;
        }
        .progress-track {
            width: 180px;
            height: 6px;
            background: var(--border);
            border-radius: 3px;
            cursor: pointer;
            position: relative;
            overflow: hidden;
        }
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, var(--accent), #c084fc);
            border-radius: 3px;
            width: 0%;
            transition: width 0.4s linear;
        }
        .no-music {
            color: var(--text-dim);
            font-style: italic;
            margin: 24px 0 32px;
        }

        .yt-hidden {
            width: 1px;
            height: 1px;
            overflow: hidden;
            opacity: 0;
            position: absolute;
            pointer-events: none;
        }

        /* === ACTION BUTTONS === */
        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: 12px;
            justify-content: center;
            animation: fade-down 0.6s ease-out 0.4s both;
        }
        .action-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 14px 28px;
            border: none;
            border-radius: 50px;
            font-family: 'Outfit', sans-serif;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .action-btn:hover { transform: translateY(-2px); }

        .btn-full {
            background: var(--green);
            color: #0a0a0f;
            box-shadow: 0 4px 16px rgba(34, 197, 94, 0.3);
        }
        .btn-half {
            background: var(--amber);
            color: #0a0a0f;
            box-shadow: 0 4px 16px rgba(245, 158, 11, 0.3);
        }
        .btn-no {
            background: var(--red);
            color: #fff;
            box-shadow: 0 4px 16px rgba(239, 68, 68, 0.3);
        }
        .btn-reset {
            background: var(--surface-2);
            color: var(--text-dim);
            border: 1px solid var(--border);
        }

        @keyframes fade-down {
            from { opacity: 0; transform: translateY(-16px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (prefers-reduced-motion: reduce) {
            *, *::before, *::after { animation: none !important; transition: none !important; }
        }
    </style>
</head>
<body>
    <div class="timer-bar" id="timerBar"></div>

    <!-- Volume control — always visible -->
    <div class="volume-control">
        <span class="vol-icon" id="volIcon" onclick="toggleMute()">&#128266;</span>
        <input type="range" class="vol-slider" id="volSlider" min="0" max="100" value="80" oninput="changeVolume(this.value)">
    </div>

    <nav>
        <a class="logo" href="{{ url_for('index') }}">pekabOO</a>
        <div class="nav-links">
            <a href="{{ url_for('index') }}">Доска</a>
        </div>
    </nav>

    <div class="main">
        <div class="cell-badge">
            <span class="cat">{{ category }}</span>
            <span class="pts">{{ points }}</span>
        </div>

        <div class="team-turn">Ходит <strong>{{ teams[current_team]['name'] }}</strong></div>

        <div class="timer-display timer-green" id="timerDisplay">{{ guess_duration }}</div>

        {% if music_type == 'youtube' and video_id %}
            <div class="yt-hidden">
                <div id="yt-player"></div>
            </div>
            <div class="player-box">
                <button class="play-btn" id="playPauseBtn" onclick="togglePlay()">&#9654;</button>
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-track" id="progressBar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="player-time" id="duration">0:00</span>
            </div>
        {% elif music_type == 'soundcloud' and sc_url %}
            <div style="position:fixed; left:-9999px; top:0; width:300px; height:166px; overflow:hidden;">
                <iframe id="sc-widget" width="300" height="166" scrolling="no" frameborder="no" allow="autoplay"
                    src=""></iframe>
            </div>
            <script>
                // Set SC widget src via JS to properly encode the URL parameter
                document.getElementById('sc-widget').src =
                    'https://w.soundcloud.com/player/?url=' + encodeURIComponent('{{ sc_url }}') +
                    '&auto_play=true&show_artwork=false&show_comments=false&show_user=false&show_reposts=false&visual=false';
            </script>
            <div class="player-box">
                <button class="play-btn" id="playPauseBtn" onclick="togglePlay()">&#9654;</button>
                <span class="player-time" id="currentTime">0:00</span>
                <div class="progress-track" id="progressBar" onclick="seekTo(event)">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
                <span class="player-time" id="duration">0:00</span>
            </div>
        {% else %}
            <p class="no-music">Музыка не назначена</p>
        {% endif %}

        <form method="post" class="actions">
            <input type="hidden" name="random_used" value="{{ random_used }}">
            <button name="action" value="full" class="action-btn btn-full">Все баллы{% if random_used %} x1.5{% endif %}</button>
            <button name="action" value="half" class="action-btn btn-half">Половина{% if random_used %} x1.5{% endif %}</button>
            <button name="action" value="no" class="action-btn btn-no">Не угадали</button>
            <button name="action" value="reset" class="action-btn btn-reset">Сбросить</button>
        </form>
    </div>

    <script>
        /* === TIMER === */
        var timeLeft = {{ guess_duration }};
        var totalTime = {{ guess_duration }};
        var timerBar = document.getElementById('timerBar');
        var timerDisplay = document.getElementById('timerDisplay');

        function updateTimerUI() {
            timerDisplay.textContent = timeLeft;
            var pct = (timeLeft / totalTime) * 100;
            timerBar.style.width = pct + '%';

            if (timeLeft <= 5) {
                timerDisplay.className = 'timer-display timer-red';
                timerBar.className = 'timer-bar danger';
            } else if (timeLeft <= 10) {
                timerDisplay.className = 'timer-display timer-amber';
                timerBar.className = 'timer-bar warning';
            } else {
                timerDisplay.className = 'timer-display timer-green';
                timerBar.className = 'timer-bar';
            }
        }

        function countdown() {
            updateTimerUI();
            if (timeLeft > 0) {
                timeLeft--;
                setTimeout(countdown, 1000);
            }
        }

        updateTimerUI();
        setTimeout(function() { countdown(); }, 500);

        /* === VOLUME === */
        var currentVolume = 80;
        var isMuted = false;
        var musicType = '{{ music_type or "" }}';

        function changeVolume(val) {
            currentVolume = parseInt(val);
            isMuted = currentVolume === 0;
            updateVolIcon();
            applyVolume();
        }

        function applyVolume() {
            var vol = isMuted ? 0 : currentVolume;
            if (musicType === 'youtube' && typeof player !== 'undefined' && player) {
                if (isMuted) { if (player.mute) player.mute(); }
                else { if (player.unMute) player.unMute(); if (player.setVolume) player.setVolume(vol); }
            }
            if (musicType === 'soundcloud' && typeof scWidget !== 'undefined' && scWidget) {
                scWidget.setVolume(vol);
            }
        }

        function toggleMute() {
            isMuted = !isMuted;
            document.getElementById('volSlider').value = isMuted ? 0 : currentVolume;
            updateVolIcon();
            applyVolume();
        }

        function updateVolIcon() {
            var icon = document.getElementById('volIcon');
            var v = isMuted ? 0 : currentVolume;
            if (v === 0) icon.innerHTML = '&#128264;';
            else if (v < 40) icon.innerHTML = '&#128265;';
            else icon.innerHTML = '&#128266;';
        }

        /* === COMMON PLAYER VARS === */
        var isPlaying = false;
        var progressInterval;

        function formatTime(s) {
            var m = Math.floor(s / 60);
            var sec = Math.floor(s % 60);
            return m + ':' + (sec < 10 ? '0' : '') + sec;
        }

        function startProgressUpdate(fn) { stopProgressUpdate(); progressInterval = setInterval(fn, 500); }
        function stopProgressUpdate() { if (progressInterval) { clearInterval(progressInterval); progressInterval = null; } }

        function updateBtn() {
            var btn = document.getElementById('playPauseBtn');
            if (btn) btn.innerHTML = isPlaying ? '&#9646;&#9646;' : '&#9654;';
        }

        {% if music_type == 'youtube' and video_id %}
        /* === YOUTUBE PLAYER === */
        var tag = document.createElement('script');
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName('script')[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);

        var player;

        function onYouTubeIframeAPIReady() {
            player = new YT.Player('yt-player', {
                height: '180', width: '320',
                videoId: '{{ video_id }}',
                playerVars: { 'autoplay': 1, 'start': {{ start_seconds or 0 }}, 'controls': 0, 'disablekb': 1, 'fs': 0, 'modestbranding': 1, 'rel': 0 },
                events: {
                    'onReady': function(e) { e.target.setVolume(currentVolume); e.target.playVideo(); },
                    'onStateChange': function(e) {
                        isPlaying = (e.data === YT.PlayerState.PLAYING);
                        updateBtn();
                        if (isPlaying) startProgressUpdate(ytProgress); else stopProgressUpdate();
                    }
                }
            });
        }

        function togglePlay() { if (!player) return; isPlaying ? player.pauseVideo() : player.playVideo(); }

        function ytProgress() {
            if (!player || !player.getDuration) return;
            var cur = player.getCurrentTime(), tot = player.getDuration();
            if (tot > 0) {
                document.getElementById('currentTime').textContent = formatTime(cur);
                document.getElementById('duration').textContent = formatTime(tot);
                document.getElementById('progressFill').style.width = (cur / tot * 100) + '%';
            }
        }

        function seekTo(event) {
            if (!player || !player.getDuration) return;
            var bar = document.getElementById('progressBar'), rect = bar.getBoundingClientRect();
            player.seekTo((event.clientX - rect.left) / rect.width * player.getDuration(), true);
        }

        {% elif music_type == 'soundcloud' and sc_url %}
        /* === SOUNDCLOUD PLAYER === */
        var scScript = document.createElement('script');
        scScript.src = 'https://w.soundcloud.com/player/api.js';
        scScript.onload = function() {
            // Wait for iframe to be ready before binding
            var iframe = document.getElementById('sc-widget');
            scWidget = SC.Widget(iframe);
            scWidget.bind(SC.Widget.Events.READY, function() {
                scWidget.setVolume(currentVolume);
                {% if start_seconds %}
                scWidget.seekTo({{ start_seconds }} * 1000);
                {% endif %}
                scWidget.play();
            });
            scWidget.bind(SC.Widget.Events.PLAY, function() { isPlaying = true; updateBtn(); startProgressUpdate(scProgress); });
            scWidget.bind(SC.Widget.Events.PAUSE, function() { isPlaying = false; updateBtn(); stopProgressUpdate(); });
            scWidget.bind(SC.Widget.Events.FINISH, function() { isPlaying = false; updateBtn(); stopProgressUpdate(); });
        };
        document.head.appendChild(scScript);

        var scWidget;

        function togglePlay() { if (!scWidget) return; isPlaying ? scWidget.pause() : scWidget.play(); }

        function scProgress() {
            if (!scWidget) return;
            scWidget.getPosition(function(pos) {
                scWidget.getDuration(function(dur) {
                    if (dur > 0) {
                        document.getElementById('currentTime').textContent = formatTime(pos / 1000);
                        document.getElementById('duration').textContent = formatTime(dur / 1000);
                        document.getElementById('progressFill').style.width = (pos / dur * 100) + '%';
                    }
                });
            });
        }

        function seekTo(event) {
            if (!scWidget) return;
            var bar = document.getElementById('progressBar'), rect = bar.getBoundingClientRect();
            var pct = (event.clientX - rect.left) / rect.width;
            scWidget.getDuration(function(dur) { scWidget.seekTo(pct * dur); });
        }
        {% else %}
        function togglePlay() {}
        function seekTo() {}
        {% endif %}
    </script>
</body>
</html>
